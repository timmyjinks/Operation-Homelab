apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vaultwarden
  namespace: flux-system
spec:
  url: https://guerzon.github.io/vaultwarden
  interval: 10m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: flux-system
spec:
  interval: 10m
  install:
    createNamespace: true
  targetNamespace: vaultwarden
  chart:
    spec:
      chart: vaultwarden
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: flux-system
  values:
    storage:
      data:
        name: "vaultwarden-data"
        size: "8Gi"
        class: "local-path"
