apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: home-gateway
  namespace: home-system
  annotations:
    cert-manager.io/issuer: home-issuer
spec:
  gatewayClassName: nginx
  listeners:
    - name: http-wildcard
      port: 80
      protocol: HTTP
      hostname: "*.home.tysonjenkins.dev"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              managed-by: home
    - name: https-wildcard
      port: 443
      hostname: "*.home.tysonjenkins.dev"
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              managed-by: home
      tls:
        mode: Terminate
        certificateRefs:
          - name: gateway-tls-secret
            kind: Secret
