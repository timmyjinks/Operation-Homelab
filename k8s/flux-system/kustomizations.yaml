apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 1m
  path: ./k8s/cert-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cert-manager
      namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nginx-gateway
  namespace: flux-system
spec:
  interval: 1m
  path: ./k8s/nginx-gateway
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: ngf
      namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tc-system
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
    - name: nginx-gateway
  interval: 1m
  path: ./k8s/tc-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tysoncloud
  namespace: flux-system
spec:
  dependsOn:
    - name: tc-system
  interval: 1m
  path: ./k8s/tysoncloud
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
