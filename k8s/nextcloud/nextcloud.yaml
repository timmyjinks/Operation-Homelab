apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nextcloud
  namespace: flux-system
spec:
  url: https://nextcloud.github.io/helm/
  interval: 10m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: flux-system
spec:
  interval: 10m
  install:
    createNamespace: true
  targetNamespace: nextcloud
  chart:
    spec:
      chart: nextcloud
      version: "2.6.5"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  values:
    image:
      pullPolicy: Always
    nextcloud:
      host: nextcloud.home-system.tysonjenkins.dev
    persistence:
      enabled: true
      storageClass: "local-path"
      accessMode: ReadWriteOnce
      size: 8Gi
      nextcloudData:
        enabled: true
        storageClass: "local-path"
        accessMode: ReadWriteOnce
        size: 8Gi
